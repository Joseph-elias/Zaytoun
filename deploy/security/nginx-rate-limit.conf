# Example Nginx edge limits aligned with backend policy.
# Tune for your real traffic and place behind HTTPS termination.

# Shared memory zones (per client IP)
limit_req_zone $binary_remote_addr zone=global_per_ip:20m rate=5r/s;      # ~300/min
limit_req_zone $binary_remote_addr zone=auth_login_per_ip:10m rate=12r/m; # 12/min
limit_req_zone $binary_remote_addr zone=reset_per_ip:10m rate=8r/5m;      # 8/5min
limit_req_zone $binary_remote_addr zone=agro_ai_per_ip:10m rate=15r/m;    # 15/min

server {
    listen 443 ssl http2;
    server_name api.example.com;

    # Global guardrail
    location / {
        limit_req zone=global_per_ip burst=40 nodelay;
        proxy_pass http://backend_upstream;
    }

    # Auth login
    location = /auth/login {
        limit_req zone=auth_login_per_ip burst=4 nodelay;
        proxy_pass http://backend_upstream;
    }

    # Password reset endpoints
    location = /auth/password-reset/request {
        limit_req zone=reset_per_ip burst=3 nodelay;
        proxy_pass http://backend_upstream;
    }

    location = /auth/password-reset/confirm {
        limit_req zone=reset_per_ip burst=3 nodelay;
        proxy_pass http://backend_upstream;
    }

    # Agro AI hot paths
    location = /agro-copilot/chat {
        limit_req zone=agro_ai_per_ip burst=5 nodelay;
        proxy_pass http://backend_upstream;
    }

    location = /agro-copilot/diagnose {
        limit_req zone=agro_ai_per_ip burst=5 nodelay;
        proxy_pass http://backend_upstream;
    }
}
