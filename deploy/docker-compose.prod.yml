services:
  agro-copilot:
    image: ghcr.io/${GHCR_OWNER}/zaytoun-agro-copilot:${IMAGE_TAG}
    container_name: zaytoun-agro-copilot
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-45}
      CORS_ORIGINS: ${AGRO_CORS_ORIGINS:-}
      INTERNAL_API_KEY: ${AGRO_COPILOT_API_KEY}
      WEB_CONCURRENCY: ${AGRO_WEB_CONCURRENCY:-1}
      WEB_TIMEOUT: ${AGRO_WEB_TIMEOUT:-120}
      WEB_GRACEFUL_TIMEOUT: ${AGRO_WEB_GRACEFUL_TIMEOUT:-40}
      WEB_KEEPALIVE: ${AGRO_WEB_KEEPALIVE:-5}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    image: ghcr.io/${GHCR_OWNER}/zaytoun-backend:${IMAGE_TAG}
    container_name: zaytoun-backend
    restart: unless-stopped
    depends_on:
      - agro-copilot
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      DB_FALLBACK_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      STARTUP_FAIL_FAST_VALIDATION: ${STARTUP_FAIL_FAST_VALIDATION:-true}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      AUTH_MFA_TOTP_ISSUER: ${AUTH_MFA_TOTP_ISSUER:-Zaytoun}
      AUTH_MFA_TOTP_DIGITS: ${AUTH_MFA_TOTP_DIGITS:-6}
      AUTH_MFA_TOTP_PERIOD_SECONDS: ${AUTH_MFA_TOTP_PERIOD_SECONDS:-30}
      AUTH_MFA_TOTP_VALID_WINDOW: ${AUTH_MFA_TOTP_VALID_WINDOW:-1}
      AGRO_COPILOT_API_BASE_URL: ${AGRO_COPILOT_API_BASE_URL:-http://agro-copilot:8001}
      AGRO_COPILOT_API_KEY: ${AGRO_COPILOT_API_KEY:-}
      AGRO_COPILOT_TIMEOUT_SECONDS: ${AGRO_COPILOT_TIMEOUT_SECONDS:-120}
      AGRO_COPILOT_MAX_RETRIES: ${AGRO_COPILOT_MAX_RETRIES:-2}
      AGRO_COPILOT_RETRY_BACKOFF_MS: ${AGRO_COPILOT_RETRY_BACKOFF_MS:-300}
      SECURITY_HSTS_ENABLED: ${SECURITY_HSTS_ENABLED:-true}
      SECURITY_HSTS_MAX_AGE_SECONDS: ${SECURITY_HSTS_MAX_AGE_SECONDS:-31536000}
      SECURITY_HSTS_INCLUDE_SUBDOMAINS: ${SECURITY_HSTS_INCLUDE_SUBDOMAINS:-true}
      SECURITY_HSTS_PRELOAD: ${SECURITY_HSTS_PRELOAD:-false}
      SECURITY_TRUSTED_HOSTS: ${SECURITY_TRUSTED_HOSTS:-}
      SECURITY_CONTENT_SECURITY_POLICY_REPORT_ONLY: ${SECURITY_CONTENT_SECURITY_POLICY_REPORT_ONLY:-false}
      SECURITY_CONTENT_SECURITY_POLICY_REPORT_URI: ${SECURITY_CONTENT_SECURITY_POLICY_REPORT_URI:-}
      SECURITY_CSP_REPORT_ENDPOINT_ENABLED: ${SECURITY_CSP_REPORT_ENDPOINT_ENABLED:-false}
      REQUEST_ID_HEADER_NAME: ${REQUEST_ID_HEADER_NAME:-X-Request-ID}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_STORAGE: ${RATE_LIMIT_STORAGE:-redis}
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-}
      RATE_LIMIT_REDIS_REQUIRED: ${RATE_LIMIT_REDIS_REQUIRED:-true}
      RATE_LIMIT_TRUST_X_FORWARDED_FOR: ${RATE_LIMIT_TRUST_X_FORWARDED_FOR:-true}
      RATE_LIMIT_TRUSTED_PROXY_CIDRS: ${RATE_LIMIT_TRUSTED_PROXY_CIDRS:-}
      RATE_LIMIT_GLOBAL_REQUESTS: ${RATE_LIMIT_GLOBAL_REQUESTS:-300}
      RATE_LIMIT_GLOBAL_WINDOW_SECONDS: ${RATE_LIMIT_GLOBAL_WINDOW_SECONDS:-60}
      RATE_LIMIT_GLOBAL_AUTHENTICATED_REQUESTS: ${RATE_LIMIT_GLOBAL_AUTHENTICATED_REQUESTS:-1800}
      RATE_LIMIT_GLOBAL_AUTHENTICATED_WINDOW_SECONDS: ${RATE_LIMIT_GLOBAL_AUTHENTICATED_WINDOW_SECONDS:-60}
      RATE_LIMIT_AUTH_LOGIN_REQUESTS: ${RATE_LIMIT_AUTH_LOGIN_REQUESTS:-20}
      RATE_LIMIT_AUTH_LOGIN_WINDOW_SECONDS: ${RATE_LIMIT_AUTH_LOGIN_WINDOW_SECONDS:-60}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_REQUIRE_PROMETHEUS_CLIENT: ${METRICS_REQUIRE_PROMETHEUS_CLIENT:-true}
      METRICS_PATH: ${METRICS_PATH:-/metrics}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-}
      WORKERS_LIST_CACHE_ENABLED: ${WORKERS_LIST_CACHE_ENABLED:-true}
      WORKERS_LIST_CACHE_TTL_SECONDS: ${WORKERS_LIST_CACHE_TTL_SECONDS:-20}
      WORKERS_LIST_CACHE_MAX_ENTRIES: ${WORKERS_LIST_CACHE_MAX_ENTRIES:-500}
      AUDIT_ALERT_ENABLED: ${AUDIT_ALERT_ENABLED:-true}
      AUDIT_ALERT_WINDOW_SECONDS: ${AUDIT_ALERT_WINDOW_SECONDS:-300}
      AUDIT_ALERT_AUTH_LOGIN_FAILED_THRESHOLD: ${AUDIT_ALERT_AUTH_LOGIN_FAILED_THRESHOLD:-20}
      AUDIT_ALERT_PASSWORD_RESET_FAILED_THRESHOLD: ${AUDIT_ALERT_PASSWORD_RESET_FAILED_THRESHOLD:-10}
      AUDIT_ALERT_AGRO_ABUSE_THRESHOLD: ${AUDIT_ALERT_AGRO_ABUSE_THRESHOLD:-30}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-60}
      WEB_GRACEFUL_TIMEOUT: ${WEB_GRACEFUL_TIMEOUT:-30}
      WEB_KEEPALIVE: ${WEB_KEEPALIVE:-5}
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  frontend:
    image: ghcr.io/${GHCR_OWNER}/zaytoun-frontend:${IMAGE_TAG}
    container_name: zaytoun-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend_uploads:
