<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Radar | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="page">
      <header class="hero">
        <div class="list-head">
          <p class="eyebrow">Worker Radar</p>
          <button class="btn ghost" id="logout-btn" type="button">Logout</button>
        </div>
        <h1>Grow Work Like an Olive Grove</h1>
        <p class="sub" id="role-hint">Register teams quickly, set clear rates, and stay available for new opportunities.</p>
        <nav class="tabs">
          <a class="tab" href="./login.html">Login</a>
          <a class="tab" href="./signup.html">Create Account</a>
          <a class="tab active" href="./register.html">Register Worker</a>
          <a class="tab" href="./my-profiles.html">My Profiles</a>
          <a class="tab" href="./workers.html">Workers Directory</a>
        </nav>
      </header>

      <section class="card">
        <h2>Team Registration</h2>
        <form id="worker-form" class="form-grid">
          <label>Name<input name="name" required minlength="2" /></label>
          <label>Phone<input name="phone" required minlength="4" /></label>
          <label>Village<input name="village" required minlength="2" /></label>

          <label>Men Count<input name="men_count" type="number" min="0" value="0" required /></label>
          <label>Women Count<input name="women_count" type="number" min="0" value="0" required /></label>

          <label>Rate Type
            <select name="rate_type" required>
              <option value="day">Per Day</option>
              <option value="hour">Per Hour</option>
            </select>
          </label>

          <label>Men Rate<input name="men_rate_value" type="number" step="0.01" min="0" /></label>
          <label>Women Rate<input name="women_rate_value" type="number" step="0.01" min="0" /></label>

          <label class="toggle">Open To Overtime
            <input id="overtime_open" name="overtime_open" type="checkbox" />
          </label>
          <label>Overtime Price<input id="overtime_price" name="overtime_price" type="number" step="0.01" min="0" disabled /></label>
          <label class="full">Overtime Note<textarea name="overtime_note" rows="3" placeholder="Optional details"></textarea></label>

          <label class="toggle">Available Now
            <input name="available" type="checkbox" checked />
          </label>

          <button class="btn" type="submit">Register Worker</button>
        </form>
        <p id="form-message" class="message"></p>
      </section>
    </main>
    <script type="module" src="./src/register.js"></script>
  </body>
</html>
