<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Radar | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/design-system.css" />
  </head>
  <body class="workers-directory-body">
    <div class="backdrop"></div>
    <main class="page page-register workers-directory-page">
      <header class="hero workers-directory-hero reveal-prep">
        <div class="workers-hero-top">
          <a class="workers-brand" href="./workers.html" aria-label="Zaytoun Home">
            <img src="./assets/zaytoun-logo.png" alt="Zaytoun logo" />
            <span>Zaytoun</span>
          </a>
        </div>
        <h1>Grow Work Like an Olive Grove</h1>
        <p class="sub" id="role-hint">Register teams quickly, set clear rates, and stay available for new opportunities.</p>
        <div class="workers-toolbar-row">
          <nav id="app-tabs" class="tabs workers-app-tabs"></nav>
          <button class="btn ghost workers-logout-btn" id="logout-btn" type="button">Logout</button>
        </div>
      </header>

      <section class="card">
        <h2>Team Registration</h2>
        <form id="worker-form" class="form-grid">
          <label>Name<input name="name" required minlength="2" /></label>
          <label>Phone<input name="phone" required minlength="4" /></label>
          <label>Village<input name="village" required minlength="2" /></label>
          <label class="full">Address<input id="worker-address" name="address" placeholder="Tap map or use live location" /></label>
          <input id="worker-latitude" name="latitude" type="hidden" />
          <input id="worker-longitude" name="longitude" type="hidden" />

          <fieldset class="full availability-panel">
            <legend>Team Location</legend>
            <div class="actions-row">
              <button class="btn ghost" id="worker-use-my-location-btn" type="button">Use My Live Location</button>
            </div>
            <div id="worker-location-map" class="map-picker"></div>
          </fieldset>

          <label>Men Count<input name="men_count" type="number" min="0" value="0" required /></label>
          <label>Women Count<input name="women_count" type="number" min="0" value="0" required /></label>

          <label>Rate Type
            <select name="rate_type" required>
              <option value="day">Per Day</option>
              <option value="hour">Per Hour</option>
            </select>
          </label>

          <label>Men Rate<input name="men_rate_value" type="number" step="0.01" min="0" /></label>
          <label>Women Rate<input name="women_rate_value" type="number" step="0.01" min="0" /></label>

          <label class="toggle">Open To Overtime
            <input id="overtime_open" name="overtime_open" type="checkbox" />
          </label>
          <label>Overtime Price<input id="overtime_price" name="overtime_price" type="number" step="0.01" min="0" disabled /></label>
          <label class="full">Overtime Note<textarea name="overtime_note" rows="3" placeholder="Optional details"></textarea></label>

          <fieldset class="full availability-panel">
            <legend>Available Dates</legend>
            <div class="availability-head">
              <p class="availability-today" id="availability-today"></p>
              <button class="btn ghost" id="clear-available-dates-btn" type="button">Clear Selection</button>
            </div>
            <p class="message">Tap the dates you are available (starting from today).</p>
            <div class="availability-month-nav">
              <button class="btn ghost" id="availability-prev-month-btn" type="button" aria-label="Previous month">&lt;</button>
              <p id="availability-month-label" class="availability-month-label"></p>
              <div class="availability-month-actions">
                <button class="btn ghost" id="availability-today-btn" type="button">Today</button>
                <button class="btn ghost" id="availability-next-month-btn" type="button" aria-label="Next month">&gt;</button>
              </div>
            </div>
            <div class="availability-weekdays" aria-hidden="true">
              <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
            <div id="availability-panel-grid" class="availability-grid"></div>
            <p id="availability-summary" class="message"></p>
            <label class="toggle">Also available for Extra Time on selected dates
              <input id="availability-extra-time" type="checkbox" />
            </label>
          </fieldset>

          <label class="toggle">Available Now
            <input name="available" type="checkbox" checked />
          </label>

          <button class="btn" type="submit">Register Worker</button>
        </form>
        <p id="form-message" class="message"></p>
      </section>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="./src/register.js"></script>
  </body>
</html>
