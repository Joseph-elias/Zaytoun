<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Radar | Agro Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/design-system.css" />
    <link rel="stylesheet" href="./css/agro-chat-widget.css" />
  </head>
  <body class="workers-directory-body">
    <div class="backdrop"></div>
    <main class="page page-wide page-agro-copilot workers-directory-page">
      <header class="hero workers-directory-hero reveal-prep">
        <div class="workers-hero-top">
          <a class="workers-brand" href="./workers.html" aria-label="Zaytoun Home">
            <img src="./assets/zaytoun-logo.png" alt="Zaytoun logo" />
            <span>Zaytoun</span>
          </a>
        </div>
        <h1>Agro Copilot</h1>
        <p class="sub" id="role-hint">Farmer-only AI assistant for olive disease diagnosis and safe actions.</p>
        <div class="workers-toolbar-row">
          <nav id="app-tabs" class="tabs workers-app-tabs"></nav>
          <button class="btn ghost workers-logout-btn" id="logout-btn" type="button">Logout</button>
        </div>
      </header>

      <section class="card">
        <div class="list-head">
          <h2>Olive Disease Assistant</h2>
          <button class="btn ghost" id="refresh-health-btn" type="button">Check Service</button>
        </div>
        <p id="agro-health-message" class="message"></p>
        <div id="agro-chat-root"></div>
      </section>
    </main>
    <script type="module" src="./src/agro-copilot.js"></script>
  </body>
</html>
