<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Radar | My Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/design-system.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="page page-bookings">
      <header class="hero">
        <div class="list-head">
          <p class="eyebrow">Worker Radar</p>
          <button class="btn ghost" id="logout-btn" type="button">Logout</button>
        </div>
        <h1>My Booking Requests</h1>
        <p class="sub" id="role-hint">Track requests and finalize deals after worker response.</p>
        <nav id="app-tabs" class="tabs"></nav>
      </header>

      <section class="card">
        <h2>Filters</h2>
        <form id="booking-filters-form" class="form-grid compact">
          <label>Status
            <select name="status">
              <option value="">All</option>
              <option value="pending_worker">Pending Worker</option>
              <option value="pending_farmer">Pending Farmer Validation</option>
              <option value="confirmed">Confirmed</option>
              <option value="rejected">Rejected</option>
            </select>
          </label>
          <button class="btn" type="submit">Apply</button>
        </form>
      </section>

      <section class="card">
        <div class="list-head">
          <h2>Bookings</h2>
          <button class="btn ghost" id="refresh-btn" type="button">Refresh</button>
        </div>
        <div id="bookings-list" class="workers-list"></div>
      </section>
    </main>
    <script type="module" src="./src/bookings.js"></script>
  </body>
</html>
