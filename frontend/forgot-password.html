<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaytoun | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/design-system.css" />
  </head>
  <body class="signup-scenic-body">
    <main class="signup-scenic-shell">
      <section class="signup-scenic-frame reveal-prep">
        <div class="signup-scenic-overlay"></div>

        <header class="signup-brand-row">
          <a class="signup-brand" href="./index.html" aria-label="Zaytoun Home">
            <img src="./assets/zaytoun-logo.png" alt="Zaytoun logo" />
          </a>
        </header>

        <section class="forgot-card">
          <h1>Reset Password</h1>
          <p class="signup-sub">
            Enter your phone number to request a reset code. The code is sent to your account email.
          </p>

          <form id="forgot-request-form" class="forgot-form">
            <h2>1. Request Reset Code</h2>
            <label>Phone<input name="phone" required minlength="4" /></label>
            <button class="btn signup-submit-btn" type="submit">Send Reset Code</button>
          </form>

          <form id="forgot-confirm-form" class="forgot-form">
            <h2>2. Confirm New Password</h2>
            <label>Phone<input name="phone" required minlength="4" /></label>
            <label>Reset Code<input name="reset_code" required minlength="6" /></label>
            <label>New Password<input name="new_password" type="password" required minlength="6" /></label>
            <button class="btn signup-submit-btn" type="submit">Update Password</button>
          </form>

          <p id="forgot-message" class="message"></p>
          <p class="auth-switch signup-switch">
            Back to
            <a href="./index.html">Log In</a>
          </p>
        </section>
      </section>
    </main>

    <script type="module" src="./src/forgot-password.js"></script>
  </body>
</html>
