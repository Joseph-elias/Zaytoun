name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: .
        run: pytest -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: /api
        run: npm run build

  docker-build-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [security-gates, backend-tests, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: zaytoun-backend:ci

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          build-args: |
            VITE_API_BASE_URL=/api
          tags: zaytoun-frontend:ci

      - name: Build agro-copilot image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./Agro-copilot
          file: ./Agro-copilot/Dockerfile
          push: false
          tags: zaytoun-agro-copilot:ci

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [security-gates, backend-tests, frontend-build, docker-build-validate]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Trigger Render backend deploy
        if: secrets.RENDER_BACKEND_DEPLOY_HOOK != ''
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger Render frontend deploy
        if: secrets.RENDER_FRONTEND_DEPLOY_HOOK != ''
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"

      - name: Trigger Render agro-copilot deploy
        if: secrets.RENDER_AGRO_COPILOT_DEPLOY_HOOK != ''
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_AGRO_COPILOT_DEPLOY_HOOK }}"
