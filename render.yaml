services:
  - type: web
    name: zaytoun-backend
    runtime: python
    rootDir: backend
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_FALLBACK_URL
        sync: false
      - key: AUTH_SECRET_KEY
        sync: false
      - key: AUTH_ALGORITHM
        value: HS256

  - type: static
    name: zaytoun-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
